<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор постов для товаров</title>
    <style>
        :root {
            --primary-color: #4F46E5;
            --primary-hover: #4338CA;
            --bg-color: #F9FAFB;
            --card-bg: #FFFFFF;
            --text-color: #1F2937;
            --text-secondary: #6B7280;
            --border-color: #E5E7EB;
            --success-color: #10B981;
            --error-color: #EF4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            color: var(--text-color);
            margin-bottom: 8px;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 16px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-color);
        }

        .form-group .required {
            color: var(--error-color);
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-group textarea {
            min-height: 120px;
            resize: vertical;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .form-group .hint {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 6px;
        }

        .btn-generate {
            width: 100%;
            padding: 14px 24px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        .btn-generate:hover {
            background-color: var(--primary-hover);
        }

        .btn-generate:active {
            transform: scale(0.98);
        }

        .btn-generate:disabled {
            background-color: #9CA3AF;
            cursor: not-allowed;
        }

        .error-message {
            background-color: #FEF2F2;
            color: var(--error-color);
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .result-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            display: none;
        }

        .result-card.show {
            display: block;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

.result-header h2 {
            font-size: 20px;
            color: var(--text-color);
        }

        .link-status {
            font-size: 13px;
            padding: 6px 10px;
            border-radius: 6px;
            margin-bottom: 12px;
            display: none;
        }

        .link-status.success {
            display: block;
            background-color: #D1FAE5;
            color: #065F46;
        }

        .link-status.warning {
            display: block;
            background-color: #FEF3C7;
            color: #92400E;
        }

        .post-content {
            background-color: #F3F4F6;
            padding: 16px;
            border-radius: 10px;
            white-space: pre-wrap;
            font-size: 15px;
            line-height: 1.7;
            color: var(--text-color);
            margin-bottom: 16px;
        }

        .btn-copy {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 20px;
            background-color: var(--success-color);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        .btn-copy:hover {
            background-color: #059669;
        }

        .btn-copy:active {
            transform: scale(0.98);
        }

        .copy-message {
            display: none;
            color: var(--success-color);
            font-weight: 500;
            margin-left: 12px;
        }

        .copy-message.error {
            color: var(--error-color);
        }

        .copy-message.show {
            display: inline;
        }

        .loading {
            opacity: 0.7;
            pointer-events: none;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>✨ Генератор постов для товаров</h1>
            <p>Создавайте уникальные посты с помощью ИИ</p>
        </div>

        <div class="card">
            <div class="error-message" id="errorMessage"></div>

            <div class="form-group">
                <label for="productUrl">Ссылка на товар</label>
                <input type="url" id="productUrl" placeholder="https://market.yandex.ru/...">
            </div>

            <div class="form-group">
                <label for="productDescription">Описание товара <span class="required">*</span></label>
                <textarea id="productDescription" rows="4" placeholder="Например: iPhone 15 Pro 512GB, синий, Apple A17 Pro"></textarea>
                <div class="hint">Обязательно - опишите товар или вставьте ссылку выше</div>
            </div>

            <div class="form-group">
                <label for="tone">Настроение поста</label>
                <select id="tone">
                    <option value="friendly">Дружелюбное 😊</option>
                    <option value="energetic">Энергичное 🔥</option>
                    <option value="humor_soft">С юмором (мягкий) 😄</option>
                    <option value="humor_irony">С юмором (ирония) 😏</option>
                    <option value="humor_crazy">С юмором (экстрим) 🤪</option>
                    <option value="curious">Интригующее 🤔</option>
                    <option value="inspirational">Вдохновляющее 🌟</option>
                    <option value="romantic">Романтичное 💕</option>
                    <option value="urgent">Срочное ⏰</option>
                    <option value="trust">Надёжное 🤝</option>
                    <option value="professional">Профессиональное 💼</option>
                    <option value="luxury">Премиум ✨</option>
                    <option value="expert">Экспертное 🎓</option>
                    <option value="fun">Развлекательное 🎉</option>
                    <option value="minimal">Краткое 📝</option>
                </select>
            </div>

            <button class="btn-generate" id="generateBtn">
                Создать пост с ИИ
            </button>
        </div>

        <div class="result-card" id="resultCard">
            <div class="result-header">
                <h2>✅ Готовый пост</h2>
            </div>
            <div class="link-status" id="linkStatus"></div>
            <div class="post-content" id="postContent"></div>
            <button class="btn-copy" id="copyBtn">
                📋 Скопировать пост
            </button>
            <span class="copy-message" id="copyMessage">Пост скопирован!</span>
        </div>
    </div>

    <script>
        const generateBtn = document.getElementById('generateBtn');
        const copyBtn = document.getElementById('copyBtn');
        const resultCard = document.getElementById('resultCard');
        const postContent = document.getElementById('postContent');
        const copyMessage = document.getElementById('copyMessage');
        const errorMessage = document.getElementById('errorMessage');
        const linkStatus = document.getElementById('linkStatus');
        const linkStatus = document.getElementById('linkStatus');

async function generatePost() {
            console.log('Начало генерации...');
            generateBtn.disabled = true;
            generateBtn.innerHTML = '<span class="spinner"></span> Генерация...';

            errorMessage.classList.remove('show');
            resultCard.classList.remove('show');

            const productUrl = document.getElementById('productUrl').value;
            const productDescription = document.getElementById('productDescription').value;
            const tone = document.getElementById('tone').value;

            console.log('URL:', productUrl, 'Description:', productDescription, 'Tone:', tone);

            if (!productUrl && !productDescription) {
                errorMessage.textContent = 'Добавьте ссылку или описание товара';
                errorMessage.classList.add('show');
                generateBtn.disabled = false;
                generateBtn.textContent = 'Создать пост с ИИ';
                return;
            }

            try {
                console.log('Отправка запроса...');
                const response = await fetch('/generate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        product_url: productUrl,
                        product_description: productDescription,
                        tone: tone
                    })
                });

                console.log('Ответ получен:', response.status);
                const data = await response.json();
                console.log('Данные:', data);

                if (data.success) {
                    postContent.textContent = data.post;
                    resultCard.classList.add('show');
                    
                    linkStatus.className = 'link-status';
                    if (data.link_read) {
                        linkStatus.textContent = '✅ Ссылка считана!';
                        linkStatus.classList.add('success');
                    } else {
                        linkStatus.textContent = '⚠️ Использовано описание';
                        linkStatus.classList.add('warning');
                    }
                } else {
                    console.log('Ошибка:', data.error);
                    errorMessage.textContent = data.error || 'Ошибка генерации';
                    errorMessage.classList.add('show');
                }

            } catch (error) {
                console.log('Exception:', error);
                errorMessage.textContent = 'Ошибка: ' + error.message;
                errorMessage.classList.add('show');
            }

            generateBtn.disabled = false;
            generateBtn.textContent = 'Создать пост с ИИ';
        }

            try {
                const response = await fetch('/generate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        product_url: productUrl,
                        product_description: productDescription,
                        tone: tone
                    })
                });

                const data = await response.json();

if (data.success) {
                    postContent.textContent = data.post;
                    resultCard.classList.add('show');
                    
                    // Показываем статус ссылки
                    linkStatus.className = 'link-status';
                    if (data.link_read) {
                        linkStatus.textContent = '✅ Ссылка считана!';
                        linkStatus.classList.add('success');
                    } else {
                        linkStatus.textContent = '⚠️ Использовано описание';
                        linkStatus.classList.add('warning');
                    }
                } else {
                        linkStatus.classList.add('error');
                        linkStatus.textContent = '⚠️ Ссылка не считана. Использовано описание.';
                    }
                } else {
                    errorMessage.textContent = data.error;
                    errorMessage.classList.add('show');
                }

            } catch (error) {
                errorMessage.textContent = 'Ошибка: ' + error.message + '. Попробуйте ещё раз.';
                errorMessage.classList.add('show');
            }

            generateBtn.disabled = false;
            generateBtn.textContent = 'Создать пост с ИИ';
        }

        function copyPost() {
            const text = postContent.textContent;
            
            // Пробуем использовать clipboard API
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text).then(() => {
                    copyMessage.textContent = 'Пост скопирован!';
                    copyMessage.classList.add('show');
                    setTimeout(() => {
                        copyMessage.classList.remove('show');
                    }, 2000);
                }).catch(err => {
                    // Fallback для старых браузеров
                    copyToClipboardFallback(text);
                });
            } else {
                // Fallback
                copyToClipboardFallback(text);
            }
        }
        
        function copyToClipboardFallback(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.select();
            try {
                document.execCommand('copy');
                copyMessage.textContent = 'Пост скопирован!';
                copyMessage.classList.add('show');
                setTimeout(() => {
                    copyMessage.classList.remove('show');
                }, 2000);
            } catch (err) {
                copyMessage.textContent = 'Не удалось скопировать';
                copyMessage.classList.add('show');
                setTimeout(() => {
                    copyMessage.classList.remove('show');
                }, 2000);
            }
            document.body.removeChild(textarea);
        }

        generateBtn.addEventListener('click', generatePost);
        copyBtn.addEventListener('click', copyPost);
    </script>
</body>
</html>
